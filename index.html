<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANIL // WATCH LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,700;1,700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf2f0;--surface:#fff;--ink:#3a1a1a;--ink2:#7a4a4a;--ink3:#a07060;
  --rose:#f2e8e4;--rb:#ddc8bc;--rd:#c0a090;
  --red:#b84040;--green:#4a8050;--amber:#9a6020;
  --serif:'EB Garamond',Georgia,serif;
  --mono:'Courier Prime','Courier New',monospace;
}
body.dark{
  --bg:#040f07;--surface:#071510;--ink:#c8f0d8;--ink2:#7ac89a;--ink3:#2d6640;
  --rose:#0a1c10;--rb:#1a3d25;--rd:#2d6640;
  --red:#5dd68a;--green:#3d9e5e;--amber:#7ac89a;
}
.theme-toggle{background:none;border:1px solid var(--rb);color:var(--ink3);font-family:var(--mono);font-size:14px;padding:4px 10px;cursor:pointer;border-radius:2px;line-height:1;transition:all 0.15s}
.theme-toggle:hover{border-color:var(--ink);color:var(--ink)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:15px}

/* -- PIN -- */
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-box{border:2px solid var(--ink);padding:3rem 2.5rem;width:100%;max-width:360px;text-align:center;background:var(--surface)}
.pin-title{font-family:var(--serif);font-size:30px;font-style:italic;color:var(--ink);margin-bottom:6px}
.pin-sub{font-size:11px;letter-spacing:2px;color:var(--ink3);margin-bottom:2rem}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:1.5rem}
.pdot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--ink3);transition:all 0.15s}
.pdot.on{background:var(--ink);border-color:var(--ink)}
#pin-inp{background:transparent;border:none;border-bottom:2px solid var(--rd);font-family:var(--mono);font-size:26px;text-align:center;width:180px;outline:none;color:var(--ink);letter-spacing:14px;padding:4px 0}
.pin-msg{font-size:12px;margin-top:1.2rem;letter-spacing:1px;height:20px;color:var(--ink2)}
.pin-timer{font-size:11px;color:var(--ink3);margin-top:6px;letter-spacing:1px}

/* -- APP -- */
.app{max-width:1000px;margin:0 auto;padding-bottom:80px}

/* -- HEADER -- */
.hdr{border-bottom:2px solid var(--ink);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:200}
.hdr-title{font-family:var(--serif);font-size:26px;font-style:italic;color:var(--ink);letter-spacing:0.5px}
.hdr-right{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--ink3);font-family:var(--mono);letter-spacing:1px}
.hdr-btn{background:none;border:1px solid var(--rb);color:var(--ink3);font-family:var(--mono);font-size:11px;padding:5px 12px;cursor:pointer;border-radius:2px;letter-spacing:1px}
.hdr-btn:hover{border-color:var(--ink);color:var(--ink)}
.hdr-btn.gear{font-size:16px;padding:4px 10px}

/* -- STATS -- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--rb);background:var(--rose)}
.stat{padding:14px 20px;border-right:1px solid var(--rb)}
.stat:last-child{border-right:none}
.stat-lbl{font-size:10px;letter-spacing:1.5px;color:var(--ink3);margin-bottom:5px}
.stat-val{font-size:28px;color:var(--ink);font-family:var(--serif);line-height:1}

/* -- CONTROLS -- */
.controls{padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--rb);background:var(--bg);position:sticky;top:57px;z-index:199}
.ctrl-sel{background:var(--surface);border:1px solid var(--rb);font-family:var(--mono);font-size:12px;color:var(--ink);padding:7px 10px;outline:none;cursor:pointer;border-radius:2px}
.ctrl-sel:focus{border-color:var(--ink)}
.search-wrap{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--rb);padding:7px 14px;border-radius:2px}
.search-wrap input{border:none;background:transparent;font-family:var(--mono);font-size:12px;color:var(--ink);outline:none;flex:1}
.search-wrap input::placeholder{color:var(--ink3)}
.search-clear{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:18px;line-height:1;padding:0}
.search-clear:hover{color:var(--red)}
.fav-btn{background:none;border:1px solid var(--rb);font-family:var(--mono);font-size:12px;color:var(--ink3);padding:7px 12px;cursor:pointer;border-radius:2px;letter-spacing:0.5px;white-space:nowrap}
.fav-btn.on{border-color:var(--red);color:var(--red);background:rgba(184,64,64,0.06)}
.exp-btn{background:var(--ink);color:var(--bg);border:none;font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:7px 16px;cursor:pointer;border-radius:2px;white-space:nowrap}
.exp-btn:hover{background:var(--ink2)}

/* -- QUICK ADD -- */
.quick-add{margin:16px 24px;border:2px solid var(--ink);border-radius:3px;overflow:hidden}
.qa-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface)}
.qa-bar input{flex:1;border:none;border-bottom:1px solid var(--rb);background:transparent;font-family:var(--serif);font-size:20px;color:var(--ink);outline:none;padding:3px 0}
.qa-bar input::placeholder{color:var(--ink3);font-style:italic}
.qa-log{background:var(--ink);color:var(--bg);border:none;font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:10px 20px;cursor:pointer;border-radius:2px;white-space:nowrap}
.qa-log:hover{background:var(--red)}
.qa-fields{background:var(--rose);border-top:1px solid var(--rb);padding:14px 16px;display:none}
.qa-fields.open{display:block}
.qa-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;align-items:flex-end}
.qaf{display:flex;flex-direction:column;gap:4px}
.qaf label{font-size:10px;letter-spacing:1.5px;color:var(--ink3)}
.qaf select,.qaf input[type=text],.qaf input[type=date],.qaf input[type=number]{background:var(--surface);border:1px solid var(--rb);font-family:var(--mono);font-size:13px;color:var(--ink);padding:7px 10px;outline:none;border-radius:2px;min-width:120px}
.qaf select:focus,.qaf input:focus{border-color:var(--ink)}
.qa-stars{display:flex;gap:6px}
.qa-star{font-size:26px;color:var(--rb);cursor:pointer;line-height:1;font-family:var(--serif);transition:color 0.1s}
.qa-star.on{color:var(--red)}
.qa-bottom{display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding-top:4px;border-top:1px solid var(--rb)}
.qa-fav{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);cursor:pointer;user-select:none}
.qa-fav input{width:16px;height:16px;cursor:pointer;accent-color:var(--red)}
.qa-save{background:var(--ink);color:var(--bg);border:none;font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:10px 22px;cursor:pointer;border-radius:2px}
.qa-save:hover{background:var(--red)}
.qa-cancel{background:none;border:none;font-family:var(--mono);font-size:12px;color:var(--ink3);cursor:pointer;padding:10px}

/* -- YEAR SECTIONS -- */
.year-section{padding:0 24px}
.year-hdr{font-family:var(--serif);font-size:38px;font-style:italic;color:var(--ink);border-bottom:2px solid var(--ink);padding:20px 0 6px;display:flex;justify-content:space-between;align-items:baseline}
.year-count{font-size:12px;color:var(--ink3);font-family:var(--mono);letter-spacing:1px;font-style:normal}

/* -- ENTRY ROW -- */
.entry-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px dashed var(--rb);transition:background 0.1s}
.entry-row:hover{background:var(--rose);margin:0 -8px;padding-left:12px;padding-right:12px;border-radius:2px}
.entry-num{font-size:12px;color:var(--ink3);min-width:30px;text-align:right;flex-shrink:0}
.entry-fav{font-size:16px;color:var(--rb);flex-shrink:0;line-height:1;cursor:pointer}
.entry-fav.on{color:var(--red)}
.entry-title-wrap{flex:1;min-width:0;cursor:pointer}
.entry-title{font-family:var(--serif);font-size:19px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.entry-season{font-size:14px;color:var(--ink2);font-family:var(--mono);margin-left:6px}
.entry-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:nowrap}
.entry-date{font-size:11px;color:var(--ink3);font-family:var(--mono);white-space:nowrap}
.entry-plat{font-size:11px;background:var(--ink);color:var(--bg);padding:3px 7px;border-radius:2px;white-space:nowrap;font-family:var(--mono)}
.entry-venue{font-size:11px;background:var(--rose);color:var(--ink2);border:1px solid var(--rb);padding:3px 7px;border-radius:2px;white-space:nowrap;font-family:var(--mono)}
.entry-lang{font-size:11px;color:var(--ink3);border:1px solid var(--rb);padding:3px 6px;border-radius:2px;white-space:nowrap;font-family:var(--mono)}
.entry-fmt{font-size:11px;color:var(--amber);font-family:var(--mono)}
.entry-cnt{font-size:12px;color:var(--red);font-family:var(--mono);font-weight:700}
.entry-rating{font-size:14px;color:var(--red);font-family:var(--serif)}
.entry-type{font-size:10px;color:var(--ink3);border:1px solid var(--rb);padding:2px 5px;border-radius:2px;font-family:var(--mono)}
.entry-edit{background:none;border:1px solid var(--rb);color:var(--ink3);font-size:13px;padding:4px 9px;cursor:pointer;border-radius:2px;flex-shrink:0;font-family:var(--mono)}
.entry-edit:hover{border-color:var(--ink);color:var(--ink);background:var(--surface)}

/* -- MODAL -- */
.modal-bg{position:fixed;inset:0;background:rgba(58,26,26,0.6);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-top:2px solid var(--ink);width:100%;max-width:680px;padding:24px 24px 40px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--serif);font-size:26px;color:var(--ink);margin-bottom:4px;line-height:1.2}
.modal-sub{font-size:11px;color:var(--ink3);letter-spacing:1px;margin-bottom:18px;border-bottom:1px solid var(--rb);padding-bottom:14px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-size:10px;letter-spacing:1.5px;color:var(--ink3)}
.mf input,.mf select,.mf textarea{width:100%;background:var(--surface);border:1px solid var(--rb);font-family:var(--mono);font-size:14px;color:var(--ink);padding:9px 12px;outline:none;border-radius:2px}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--ink)}
.mf textarea{resize:vertical;min-height:70px}
.mf-full{grid-column:1/-1}
.modal-stars{display:flex;gap:8px;margin:4px 0 18px}
.modal-star{font-size:30px;color:var(--rb);cursor:pointer;font-family:var(--serif);line-height:1;transition:color 0.1s}
.modal-star.on{color:var(--red)}
.modal-fav{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink2);cursor:pointer;margin-bottom:18px;user-select:none}
.modal-fav input{width:16px;height:16px;cursor:pointer;accent-color:var(--red)}
.rw-info{font-size:12px;color:var(--ink2);margin-bottom:14px;padding:10px 14px;background:var(--rose);border-radius:2px;line-height:1.8}
.modal-btns{display:flex;gap:10px;flex-wrap:wrap}
.m-btn{border:none;font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:11px 18px;cursor:pointer;border-radius:2px}
.m-save{background:var(--ink);color:var(--bg);flex:1}
.m-save:hover{background:var(--red)}
.m-rw{background:var(--rose);color:var(--ink);border:1px solid var(--rb)!important}
.m-rw:hover{border-color:var(--ink)!important}
.m-del{background:transparent;color:var(--red);border:1px solid var(--red)!important}
.m-del:hover{background:var(--red);color:var(--bg)}
.m-close{background:transparent;color:var(--ink3);border:1px solid var(--rb)!important}

/* -- SETTINGS PANEL -- */
.settings-panel{position:fixed;inset:0;background:var(--bg);z-index:800;display:none;flex-direction:column;overflow:hidden}
.settings-panel.open{display:flex}
.settings-hdr{border-bottom:2px solid var(--ink);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.settings-title{font-family:var(--serif);font-size:26px;font-style:italic;color:var(--ink)}
.settings-close{background:none;border:1px solid var(--rb);color:var(--ink3);font-family:var(--mono);font-size:12px;padding:6px 14px;cursor:pointer;border-radius:2px;letter-spacing:1px}
.settings-close:hover{border-color:var(--ink);color:var(--ink)}
.settings-tabs{display:flex;border-bottom:1px solid var(--rb);flex-shrink:0;background:var(--rose);overflow-x:auto}
.stab{padding:12px 20px;font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent}
.stab:hover{color:var(--ink)}
.stab.active{color:var(--ink);border-bottom-color:var(--ink)}
.settings-body{flex:1;overflow-y:auto;padding:24px}
.options-list{max-width:500px}
.opt-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--rb);background:var(--surface);border-radius:2px;margin-bottom:6px}
.opt-row:hover{background:var(--rose)}
.opt-val{flex:1;font-family:var(--mono);font-size:14px;color:var(--ink)}
.opt-inp{flex:1;border:none;border-bottom:1px solid var(--ink);background:transparent;font-family:var(--mono);font-size:14px;color:var(--ink);outline:none;padding:2px 0}
.opt-default{font-size:10px;color:var(--ink3);letter-spacing:1px;border:1px solid var(--rb);padding:2px 6px;border-radius:2px}
.opt-edit{background:none;border:1px solid var(--rb);color:var(--ink3);font-family:var(--mono);font-size:12px;padding:4px 10px;cursor:pointer;border-radius:2px}
.opt-edit:hover{border-color:var(--ink);color:var(--ink)}
.opt-save{background:var(--ink);color:var(--bg);border:none;font-family:var(--mono);font-size:12px;padding:4px 10px;cursor:pointer;border-radius:2px}
.opt-del{background:none;border:1px solid var(--rb);color:var(--red);font-family:var(--mono);font-size:12px;padding:4px 8px;cursor:pointer;border-radius:2px}
.opt-del:hover{background:var(--red);color:var(--bg);border-color:var(--red)}
.drag-handle{cursor:grab;color:var(--rd);font-size:20px;padding:0 10px 0 0;user-select:none;flex-shrink:0;line-height:1}
.drag-handle:active{cursor:grabbing}
.opt-row.drag-over{outline:2px solid var(--ink)}
.opt-row[draggable=true]{cursor:default}
.opt-add-row{display:flex;gap:10px;margin-top:16px;max-width:500px}
.opt-add-inp{flex:1;background:var(--surface);border:1px solid var(--rb);font-family:var(--mono);font-size:14px;color:var(--ink);padding:9px 12px;outline:none;border-radius:2px}
.opt-add-inp:focus{border-color:var(--ink)}
.opt-add-btn{background:var(--ink);color:var(--bg);border:none;font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:9px 18px;cursor:pointer;border-radius:2px;white-space:nowrap}
.opt-add-btn:hover{background:var(--red)}
.settings-note{font-size:11px;color:var(--ink3);margin-top:8px;line-height:1.7}
.drag-handle{cursor:grab;color:var(--ink3);font-size:18px;padding:0 8px 0 0;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.opt-row.drag-over{border-top:2px solid var(--ink);border-radius:0}
.opt-row[draggable]{cursor:default}

/* -- EXPORT MENU -- */
.exp-menu{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);border:2px solid var(--ink);padding:24px;z-index:600;min-width:280px;border-radius:3px}
.exp-menu-title{font-size:11px;letter-spacing:2px;color:var(--ink);border-bottom:1px solid var(--rb);padding-bottom:12px;margin-bottom:16px}
.exp-menu-btn{display:block;width:100%;font-family:var(--mono);font-size:13px;letter-spacing:1px;padding:12px 16px;cursor:pointer;margin-bottom:10px;border-radius:2px;text-align:left}

/* -- TOAST -- */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:10px 24px;border-radius:2px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}

/* -- MISC -- */
.loading{padding:3rem;text-align:center;color:var(--ink3);font-size:14px;letter-spacing:2px}
.empty{padding:3rem;text-align:center;color:var(--ink3);font-size:18px;font-style:italic;font-family:var(--serif)}
@media(max-width:640px){
  .stats{grid-template-columns:1fr 1fr}
  .stat:nth-child(2){border-right:none}
  .stat:nth-child(3){border-top:1px solid var(--rb)}
  .stat:nth-child(4){border-top:1px solid var(--rb);border-right:none}
  .hdr{padding:10px 16px}.hdr-title{font-size:20px}
  .controls{padding:8px 16px;top:51px}
  .year-section{padding:0 16px}.year-hdr{font-size:28px}
  .entry-title{font-size:17px}.entry-date,.entry-fmt,.entry-lang{display:none}
  .quick-add{margin:12px 16px}
  .modal{padding:18px 16px 36px}.modal-grid{grid-template-columns:1fr}
  .modal-btns{flex-direction:column}.m-btn{width:100%}
  .settings-body{padding:16px}
}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-title">Anil // Watch Log</div>
    <div class="pin-sub">GOOGLE AUTHENTICATOR CODE</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
      <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
    </div>
    <input id="pin-inp" type="tel" maxlength="6" inputmode="numeric" style="ime-mode:disabled"
      oninput="updateDots(this.value)" onkeydown="if(event.key==='Enter')submitPin()" autofocus autocomplete="off" placeholder="______"/>
    <div id="pin-msg" class="pin-msg"></div>
    <button onclick="submitPin()" style="margin-top:1.5rem;background:var(--ink);color:var(--bg);border:none;font-family:var(--mono);font-size:13px;letter-spacing:2px;padding:12px 40px;cursor:pointer;border-radius:2px;width:100%">LOGIN</button>
    <div id="pin-timer" class="pin-timer"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-title">Anil // Watch Log</div>
    <div class="hdr-right">
      <span id="hdr-date"></span>
      <span id="hdr-count"></span>
      <button class="hdr-btn" onclick="toggleStats()" id="stats-btn">STATS</button>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="hdr-btn gear" onclick="openSettings()" title="Settings">&#9881;</button>
      <button class="hdr-btn" onclick="logout()">LOCK</button>
    </div>
  </div>

  <div class="stats" id="stats-strip"></div>

  <div class="controls">
    <select class="ctrl-sel" id="f-year" onchange="applyFilters()"><option value="">ALL YEARS</option></select>
    <select class="ctrl-sel" id="f-type" onchange="applyFilters()"><option value="">ALL TYPES</option></select>
    <select class="ctrl-sel" id="f-platform" onchange="applyFilters()"><option value="">ALL PLATFORMS</option></select>
    <select class="ctrl-sel" id="f-format" onchange="applyFilters()"><option value="">ALL FORMATS</option></select>
    <select class="ctrl-sel" id="f-lang" onchange="applyFilters()"><option value="">ALL LANGUAGES</option></select>
    <div class="search-wrap">
      <input id="search-inp" placeholder="search titles..." oninput="applyFilters()"/>
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <button class="fav-btn" id="fav-btn" onclick="toggleFavFilter()">★ FAVOURITES</button>
    <button class="exp-btn" onclick="showExportMenu()">EXPORT ▾</button>
  </div>

  <div class="quick-add">
    <div class="qa-bar">
      <input id="qa-title" placeholder="What did you watch?" onkeydown="if(event.key==='Enter')openQA()"/>
      <button class="qa-log" onclick="openQA()">+ LOG</button>
    </div>
    <div class="qa-fields" id="qa-fields">
      <div class="qa-row">
        <div class="qaf"><label>DATE</label><input type="date" id="qa-date" style="width:160px"/></div>
        <div class="qaf"><label>TYPE</label><select id="qa-type" onchange="toggleQAVis()"></select></div>
        <div class="qaf" id="qa-season-f" style="display:none"><label>SEASON</label><input type="number" id="qa-season" min="1" max="30" placeholder="1" style="width:80px"/></div>
        <div class="qaf"><label>FORMAT</label><select id="qa-format" onchange="toggleQAVis()"></select></div>
        <div class="qaf" id="qa-platform-f"><label>PLATFORM</label><select id="qa-platform"></select></div>
        <div class="qaf" id="qa-venue-f" style="display:none"><label>VENUE</label><select id="qa-venue"></select></div>
        <div class="qaf"><label>LANGUAGE</label><select id="qa-lang"></select></div>
      </div>
      <div class="qa-row">
        <div class="qaf" style="flex:1;min-width:200px"><label>NOTES</label><input type="text" id="qa-notes" placeholder="optional..."/></div>
        <div class="qaf"><label>RATING</label><div class="qa-stars" id="qa-stars">
          <span class="qa-star" onclick="setQAStar(1)">★</span>
          <span class="qa-star" onclick="setQAStar(2)">★</span>
          <span class="qa-star" onclick="setQAStar(3)">★</span>
          <span class="qa-star" onclick="setQAStar(4)">★</span>
          <span class="qa-star" onclick="setQAStar(5)">★</span>
        </div></div>
      </div>
      <div class="qa-bottom">
        <label class="qa-fav"><input type="checkbox" id="qa-fav"/> ★ Mark as Favourite</label>
        <button class="qa-save" onclick="saveQA()">SAVE ENTRY</button>
        <button class="qa-cancel" onclick="closeQA()">CANCEL</button>
      </div>
    </div>
  </div>

  <div id="entries-wrap"></div>
</div>

<!-- STATS PANEL -->
<div id="stats-panel" style="display:none;max-width:1000px;margin:0 auto;padding:0 0 80px"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-hdr">
    <div class="settings-title">Settings</div>
    <button class="settings-close" onclick="closeSettings()">✕ CLOSE</button>
  </div>
  <div class="settings-tabs" id="settings-tabs"></div>
  <div class="settings-body" id="settings-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const B32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

// TOTP handled server-side via /api/auth

// -- API via Edge Functions (no Supabase key in browser) --
const EFN = 'https://fbiqereeiquujhzjeuby.supabase.co/functions/v1/api';
let WL_SESSION = '';
try { WL_SESSION = JSON.parse(localStorage.getItem('wl_sess')||'{}').token||''; } catch(e) {}

function getHeaders() {
  return {'Content-Type':'application/json','x-wl-session':WL_SESSION,'Prefer':'return=representation'};
}

async function apiFetch(method, path, body) {
  const r = await fetch(EFN + path, {
    method,
    headers: getHeaders(),
    body: body ? JSON.stringify(body) : undefined
  });
  if (r.status === 401 && path !== '/auth') { logout(); return null; }
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}
// entries
const getEntries = () => apiFetch('GET', '/api/entries');
const postEntry = (b) => apiFetch('POST', '/api/entries', b);
const patchEntry = (id, b) => apiFetch('PATCH', `/api/entries?id=${id}`, b);
const delEntry_ = (id) => apiFetch('DELETE', `/api/entries?id=${id}`);
// options
const getOptions = (cat) => apiFetch('GET', cat ? `/api/options?category=${cat}` : '/api/options');
const postOption = (b) => apiFetch('POST', '/api/options', b);
const patchOption = (id, b) => apiFetch('PATCH', `/api/options?id=${id}`, b);
const delOption = (id) => apiFetch('DELETE', `/api/options?id=${id}`);

// -- STATE --
let all=[],filtered=[],opts={},showFavOnly=false,qaRating=0;
const CATS=['type','platform','format','language','venue'];
const CAT_LABELS={type:'Types',platform:'Platforms',format:'Formats',language:'Languages',venue:'Venues'};
let activeCat='type';

// -- PIN --

setInterval(()=>{const el=document.getElementById('pin-timer');if(el&&document.getElementById('pin-screen').style.display!=='none')el.textContent='Code refreshes in '+(30-Math.floor(Date.now()/1000)%30)+'s';},500);

function updateDots(v){
  const dots=document.querySelectorAll('.pdot');
  dots.forEach((d,i)=>d.classList.toggle('on',i<v.length));
}
function submitPin(){
  const v=document.getElementById('pin-inp').value.trim();
  if(v.length<6){
    setPinMsg('// ENTER ALL 6 DIGITS','var(--amber)');return;
  }
  document.getElementById('pin-inp').disabled=true;
  verifyTOTP(v);
}
function setPinMsg(m,c){
  const el=document.getElementById('pin-msg');
  el.textContent=m;el.style.color=c;
}
async function verifyTOTP(v){
  const dots=document.querySelectorAll('.pdot');
  setPinMsg('// VERIFYING...','var(--amber)');
  try{
    const r=await fetch(EFN+'/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:v})
    });
    const data=await r.json();
    if(data.ok){
      localStorage.setItem('wl_sess',JSON.stringify({ts:Date.now(),token:data.token}));
      WL_SESSION=data.token;
      setPinMsg('// ACCESS GRANTED','var(--green)');
      setTimeout(()=>{
        document.getElementById('pin-screen').style.display='none';
        document.getElementById('app').style.display='block';
        initApp();
      },350);
    } else {
      setPinMsg('// WRONG CODE -- TRY AGAIN','var(--red)');
      document.getElementById('pin-inp').disabled=false;
      document.getElementById('pin-inp').value='';
      dots.forEach(d=>d.classList.remove('on'));
    }
  } catch(e){
    setPinMsg('// CONNECTION ERROR -- CHECK NETWORK','var(--red)');
    document.getElementById('pin-inp').disabled=false;
    document.getElementById('pin-inp').value='';
    dots.forEach(d=>d.classList.remove('on'));
  }
}
function logout(){localStorage.removeItem('wl_sess');location.reload();}
// session check moved to end

// -- INIT --
async function initApp(){
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('qa-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('entries-wrap').innerHTML='<div class="loading">LOADING ARCHIVE...</div>';
  const [data,optData]=await Promise.all([
    getEntries(),
    getOptions()
  ]);
  all=data||[];
  // build opts map
  CATS.forEach(c=>{opts[c]=(optData||[]).filter(o=>o.category===c).map(o=>o.value);});
  populateAllDropdowns();
  buildYearFilter();
  applyFilters();
}

function populateAllDropdowns(){
  // QA dropdowns
  fillSel('qa-type',opts.type,'');
  fillSel('qa-format',opts.format,'');
  fillSel('qa-platform',opts.platform,'');
  fillSel('qa-venue',opts.venue,'');
  fillSelLang('qa-lang');
  // filter dropdowns
  fillSel('f-type',opts.type,'ALL TYPES','');
  fillSel('f-format',opts.format,'ALL FORMATS','');
  const langOpts=opts.language.map(l=>l==='Hindi/English'?'':l).filter((v,i,a)=>a.indexOf(v)===i);
  fillSel('f-lang',opts.language,'ALL LANGUAGES','');
}

function fillSel(id,values,allLabel,emptyVal){
  const sel=document.getElementById(id);if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='';
  if(allLabel!==undefined){const o=document.createElement('option');o.value=emptyVal!==undefined?emptyVal:'';o.textContent=allLabel;sel.appendChild(o);}
  values.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
  if(cur)sel.value=cur;
}

function fillSelLang(id){
  const sel=document.getElementById(id);if(!sel)return;
  sel.innerHTML='<option value="">Hindi/English</option>';
  opts.language.filter(l=>l!=='Hindi/English').forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;sel.appendChild(o);});
}

function buildYearFilter(){
  const years=[...new Set(all.map(e=>e.year).filter(Boolean))].sort((a,b)=>b-a);
  const sel=document.getElementById('f-year');
  sel.innerHTML='<option value="">ALL YEARS</option>';
  years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);});
  // platform filter
  const plats=[...new Set(all.map(e=>e.platform).filter(Boolean))].sort();
  const fp=document.getElementById('f-platform');
  fp.innerHTML='<option value="">ALL PLATFORMS</option>';
  plats.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;fp.appendChild(o);});
}

// -- QUICK ADD --
function toggleQAVis(){
  const fmt=document.getElementById('qa-format').value;
  const type=document.getElementById('qa-type').value;
  const isT=fmt==='Theatre';
  const isS=(type||'').toLowerCase()==='series';
  document.getElementById('qa-platform-f').style.display=isT?'none':'block';
  document.getElementById('qa-venue-f').style.display=isT?'block':'none';
  document.getElementById('qa-season-f').style.display=isS?'block':'none';
}
function openQA(){
  const t=document.getElementById('qa-title').value.trim();
  if(!t)return;
  document.getElementById('qa-fields').classList.add('open');
  toggleQAVis();
}
function closeQA(){
  document.getElementById('qa-fields').classList.remove('open');
  document.getElementById('qa-title').value='';
  document.getElementById('qa-notes').value='';
  document.getElementById('qa-fav').checked=false;
  qaRating=0;
  document.querySelectorAll('.qa-star').forEach(s=>s.classList.remove('on'));
}
function setQAStar(n){qaRating=n;document.querySelectorAll('.qa-star').forEach((s,i)=>s.classList.toggle('on',i<n));}

async function saveQA(){
  const title=document.getElementById('qa-title').value.trim();
  if(!title){toast('Enter a title');return;}
  const d=document.getElementById('qa-date').value;
  const yr=d?parseInt(d.split('-')[0]):new Date().getFullYear();
  const fmt=document.getElementById('qa-format').value;
  const isT=fmt==='Theatre';
  const type=document.getElementById('qa-type').value;
  const isS=(type||'').toLowerCase()==='series';
  const payload={
    title,type,
    season:isS?(parseInt(document.getElementById('qa-season').value)||null):null,
    watch_date:d||null,
    platform:isT?null:document.getElementById('qa-platform').value,
    venue:isT?document.getElementById('qa-venue').value:null,
    format:fmt,language:document.getElementById('qa-lang').value||'',
    rating:qaRating||null,notes:document.getElementById('qa-notes').value.trim()||null,
    is_favourite:document.getElementById('qa-fav').checked,
    watch_count:1,first_watched:d||null,last_watched:d||null,year:yr
  };
  const ex=all.find(e=>e.title.toLowerCase()===title.toLowerCase());
  if(ex){
    const choice=confirm(`"${title}" already logged.\n\nOK = mark as rewatch (+1)\nCancel = save as new separate entry`);
    if(choice){
      const upd={watch_count:(ex.watch_count||1)+1,last_watched:d||ex.last_watched};
      await patchEntry(ex.id,upd);Object.assign(ex,upd);
      toast('REWATCH x'+ex.watch_count);closeQA();applyFilters();return;
    }
  }
  const res=await postEntry(payload);
  if(res&&res[0]){all.unshift(res[0]);toast('LOGGED -- '+title);closeQA();buildYearFilter();applyFilters();}
  else toast('ERROR -- TRY AGAIN');
}

// -- FILTERS --
function applyFilters(){
  const yr=document.getElementById('f-year').value;
  const tp=document.getElementById('f-type').value;
  const pl=document.getElementById('f-platform').value;
  const fm=document.getElementById('f-format').value;
  const ln=document.getElementById('f-lang').value;
  const q=document.getElementById('search-inp').value.toLowerCase().trim();
  filtered=all.filter(e=>{
    if(yr&&String(e.year)!==yr)return false;
    if(tp&&(e.type||'').toLowerCase()!==tp.toLowerCase())return false;
    if(pl&&e.platform!==pl)return false;
    if(fm&&e.format!==fm)return false;
    if(ln&&e.language!==ln)return false;
    if(showFavOnly&&!e.is_favourite)return false;
    if(q){
      const searchIn=[e.title,e.notes,e.venue,e.platform,e.language].filter(Boolean).join(' ').toLowerCase();
      if(!searchIn.includes(q))return false;
    }
    return true;
  });
  renderStats();renderEntries();
  document.getElementById('hdr-count').textContent=filtered.length+' TITLES';
}
function clearSearch(){document.getElementById('search-inp').value='';applyFilters();}
function toggleFavFilter(){showFavOnly=!showFavOnly;document.getElementById('fav-btn').classList.toggle('on',showFavOnly);applyFilters();}

// -- STATS --
function renderStats(){
  const t=filtered.length,th=filtered.filter(e=>e.format==='Theatre').length;
  const favs=filtered.filter(e=>e.is_favourite).length;
  const pm=filtered.reduce((a,e)=>{if(e.platform){a[e.platform]=(a[e.platform]||0)+1;}return a},{});
  const tp=Object.entries(pm).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-strip').innerHTML=`
    <div class="stat"><div class="stat-lbl">TOTAL WATCHED</div><div class="stat-val">${t}</div></div>
    <div class="stat"><div class="stat-lbl">IN THEATRE</div><div class="stat-val">${th}</div></div>
    <div class="stat"><div class="stat-lbl">TOP PLATFORM</div><div class="stat-val" style="font-size:20px;margin-top:4px">${tp?tp[0]:'--'}</div></div>
    <div class="stat"><div class="stat-lbl">FAVOURITES</div><div class="stat-val">${favs}</div></div>`;
}

// -- RENDER ENTRIES --
function renderEntries(){
  const wrap=document.getElementById('entries-wrap');
  if(!filtered.length){wrap.innerHTML='<div class="empty">No entries found</div>';return;}
  const byYear={};
  filtered.forEach(e=>{const y=e.year||'?';if(!byYear[y])byYear[y]=[];byYear[y].push(e);});
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  let html='';
  years.forEach(yr=>{
    const entries=byYear[yr];
    // sort desc by date for display, number sequentially 01..N from earliest=1
    const sorted=[...entries].sort((a,b)=>(a.watch_date||'')>(b.watch_date||'')?1:-1);
    const numMap={};sorted.forEach((e,i)=>numMap[e.id]=i+1);
    html+=`<div class="year-section"><div class="year-hdr"><span>${yr}</span><span class="year-count">${entries.length} WATCHED</span></div>`;
    entries.forEach(e=>{
      const num=String(numMap[e.id]).padStart(2,'0');
      const date=e.watch_date?e.watch_date.substring(5).replace('-','.'):'';
      const stars=e.rating?'★'.repeat(e.rating):'';
      const favCls=e.is_favourite?'on':'';
      const lang=e.language?`<span class="entry-lang">${e.language}</span>`:'';
      const fmt=e.format&&e.format!=='OTT'?`<span class="entry-fmt">${e.format}</span>`:'';
      const cnt=e.watch_count>1?`<span class="entry-cnt">×${e.watch_count}</span>`:'';
      const typebadge=e.type&&e.type!=='movie'?`<span class="entry-type">${e.type}</span>`:'';
      const platbadge=e.format==='Theatre'
        ?`<span class="entry-venue">${e.venue||'Theatre'}</span>`
        :`<span class="entry-plat">${e.platform||''}</span>`;
      html+=`<div class="entry-row">
        <span class="entry-num">${num}</span>
        <span class="entry-fav ${favCls}" onclick="quickToggleFav(${e.id},event)" title="Toggle favourite">★</span>
        <span class="entry-title-wrap" onclick="openModal(${e.id})">
          <span class="entry-title">${e.title}</span>${e.season?`<span class="entry-season">S${e.season}</span>`:''}
        </span>
        <span class="entry-meta">
          ${cnt}${typebadge}${lang}${platbadge}${fmt}
          <span class="entry-date">${date}</span>
          ${stars?`<span class="entry-rating">${stars}</span>`:''}
        </span>
        <button class="entry-edit" onclick="openModal(${e.id})" title="Edit">✎ EDIT</button>
      </div>`;
    });
    html+='</div>';
  });
  wrap.innerHTML=html;
}

async function quickToggleFav(id,e){
  e.stopPropagation();
  const entry=all.find(x=>x.id===id);if(!entry)return;
  entry.is_favourite=!entry.is_favourite;
  await patchEntry(id,{is_favourite:entry.is_favourite});
  applyFilters();toast(entry.is_favourite?'★ ADDED TO FAVOURITES':'REMOVED FROM FAVOURITES');
}

// -- MODAL --
function buildSelect(id,values,current,emptyOpt){
  let h=emptyOpt?`<option value="">${emptyOpt}</option>`:'';
  values.forEach(v=>h+=`<option value="${v}"${current===v?' selected':''}>${v}</option>`);
  return `<select id="${id}">${h}</select>`;
}

function openModal(id){
  const e=all.find(x=>x.id===id);if(!e)return;
  const isT=e.format==='Theatre';
  const isS=(e.type||'').toLowerCase()==='series';
  const stars=Array.from({length:5},(_,i)=>`<span class="modal-star${(e._pr||e.rating||0)>i?' on':''}" onclick="setModalStar(${id},${i+1})">★</span>`).join('');
  const rw=e.watch_count>1?`<div class="rw-info">Watched ${e.watch_count}× &nbsp;.&nbsp; first: ${e.first_watched||'?'} &nbsp;.&nbsp; last: ${e.last_watched||'?'}</div>`:'';
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-title">${e.title}</div>
    <div class="modal-sub">${(e.type||'movie').toUpperCase()}${e.season?' . S'+e.season:''} . ${e.year||''} . ${e.format||'OTT'}</div>
    ${rw}
    <div class="modal-grid">
      <div class="mf"><label>TITLE</label><input id="me-title" value="${(e.title||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"/></div>
      <div class="mf"><label>DATE</label><input type="date" id="me-date" value="${e.watch_date||''}"/></div>
      <div class="mf"><label>TYPE</label>${buildSelect('me-type',opts.type,e.type||'movie')}</div>
      <div class="mf" id="me-season-w" style="${isS?'':'display:none'}"><label>SEASON</label><input type="number" id="me-season" value="${e.season||''}" min="1" max="30" placeholder="--"/></div>
      <div class="mf"><label>FORMAT</label>${buildSelect('me-format',opts.format,e.format||'OTT')}</div>
      <div class="mf" id="me-platform-w" style="${isT?'display:none':''}"><label>PLATFORM</label>${buildSelect('me-platform',opts.platform,e.platform||'')}</div>
      <div class="mf" id="me-venue-w" style="${isT?'':'display:none'}"><label>VENUE</label>${buildSelect('me-venue',opts.venue,e.venue||'')}</div>
      <div class="mf"><label>LANGUAGE</label>${buildSelect('me-lang',['',...opts.language.filter(l=>l!=='Hindi/English')],e.language||'','Hindi/English')}</div>
      <div class="mf"><label>WATCH COUNT</label><input type="number" id="me-wc" value="${e.watch_count||1}" min="1"/></div>
      <div class="mf mf-full"><label>NOTES</label><textarea id="me-notes" placeholder="optional notes...">${e.notes||''}</textarea></div>
    </div>
    <div style="font-size:10px;letter-spacing:1.5px;color:var(--ink3);margin-bottom:8px">RATING</div>
    <div class="modal-stars" id="mstars-${id}">${stars}</div>
    <label class="modal-fav"><input type="checkbox" id="me-fav"${e.is_favourite?' checked':''}/> Mark as Favourite</label>
    <div class="modal-btns">
      <button class="m-btn m-save" onclick="saveModal(${id})">SAVE</button>
      <button class="m-btn m-rw" onclick="logRewatch(${id})">+1 REWATCH</button>
      <button class="m-btn m-del" onclick="deleteEntry(${id})">DELETE</button>
      <button class="m-btn m-close" onclick="closeModal()">CLOSE</button>
    </div>`;
  document.getElementById('modal-bg').classList.add('open');
  // bind onchange after DOM is ready
  const mtype=document.getElementById('me-type');
  const mfmt=document.getElementById('me-format');
  if(mtype)mtype.onchange=()=>toggleModalVis(id);
  if(mfmt)mfmt.onchange=()=>toggleModalVis(id);
}

function toggleModalVis(id){
  const fmt=document.getElementById('me-format').value;
  const type=document.getElementById('me-type').value;
  const isT=fmt==='Theatre';
  const isS=(type||'').toLowerCase()==='series';
  document.getElementById('me-platform-w').style.display=isT?'none':'block';
  document.getElementById('me-venue-w').style.display=isT?'block':'none';
  document.getElementById('me-season-w').style.display=isS?'block':'none';
}

function setModalStar(id,n){
  const e=all.find(x=>x.id===id);if(e)e._pr=n;
  document.querySelectorAll(`#mstars-${id} .modal-star`).forEach((s,i)=>s.classList.toggle('on',i<n));
}

async function saveModal(id){
  const e=all.find(x=>x.id===id);if(!e)return;
  const d=document.getElementById('me-date').value;
  const fmt=document.getElementById('me-format').value;
  const isT=fmt==='Theatre';
  const type=document.getElementById('me-type').value;
  const isS=(type||'').toLowerCase()==='series';
  const upd={
    title:document.getElementById('me-title').value.trim(),type,
    season:isS?(parseInt(document.getElementById('me-season').value)||null):null,
    watch_date:d||null,format:fmt,
    platform:isT?null:document.getElementById('me-platform').value,
    venue:isT?document.getElementById('me-venue').value:null,
    language:document.getElementById('me-lang').value||'',
    watch_count:parseInt(document.getElementById('me-wc').value)||1,
    rating:e._pr||e.rating||null,
    notes:document.getElementById('me-notes').value.trim()||null,
    is_favourite:document.getElementById('me-fav').checked,
    year:d?parseInt(d.split('-')[0]):(e.year||null)
  };
  await patchEntry(id,upd);
  Object.assign(e,upd);delete e._pr;
  closeModal();applyFilters();toast('SAVED');
}

async function logRewatch(id){
  const e=all.find(x=>x.id===id);if(!e)return;
  const today=new Date().toISOString().split('T')[0];
  const upd={watch_count:(e.watch_count||1)+1,last_watched:today};
  await patchEntry(id,upd);Object.assign(e,upd);
  closeModal();applyFilters();toast('REWATCH ×'+e.watch_count);
}

async function deleteEntry(id){
  if(!confirm('Delete this entry permanently?'))return;
  await delEntry_(id);
  all=all.filter(e=>e.id!==id);closeModal();buildYearFilter();applyFilters();toast('DELETED');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

// -- SETTINGS --
async function openSettings(){
  document.getElementById('settings-panel').classList.add('open');
  renderSettingsTabs();
  await renderSettingsCat(activeCat);
}
function closeSettings(){document.getElementById('settings-panel').classList.remove('open');}

function renderSettingsTabs(){
  document.getElementById('settings-tabs').innerHTML=CATS.map(c=>
    `<button class="stab${c===activeCat?' active':''}" onclick="switchSettingsCat('${c}')">${CAT_LABELS[c].toUpperCase()}</button>`
  ).join('');
}

async function switchSettingsCat(cat){
  activeCat=cat;renderSettingsTabs();await renderSettingsCat(cat);
}

async function renderSettingsCat(cat){
  const body=document.getElementById('settings-body');
  body.innerHTML='<div class="loading">LOADING...</div>';
  const data=await getOptions(cat);
  const items=data||[];
  let html=`<div class="options-list" id="opts-list">`;
  items.forEach(item=>{
    const def=item.is_default?`<span class="opt-default">DEFAULT</span>`:'';
    html+=`<div class="opt-row" id="opt-row-${item.id}" draggable="true" data-id="${item.id}" data-sort="${item.sort_order}">
      <span class="drag-handle" title="Drag to reorder">&#8801;</span>
      <span class="opt-val" id="opt-val-${item.id}">${item.value}</span>
      ${def}
      <button class="opt-edit" onclick="editOpt(${item.id},'${item.value.replace(/'/g,"\\'")}')">✎</button>
      <button class="opt-del" onclick="deleteOpt(${item.id},'${item.value.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  });
  html+=`</div>
  <div class="opt-add-row">
    <input class="opt-add-inp" id="opt-new-val" placeholder="Add new ${CAT_LABELS[cat].toLowerCase().slice(0,-1)}..." onkeydown="if(event.key==='Enter')addOpt('${cat}')"/>
    <button class="opt-add-btn" onclick="addOpt('${cat}')">+ ADD</button>
  </div>
  <div class="settings-note">&#8801; Drag rows to reorder &nbsp;·&nbsp; ✕ Delete keeps existing entries intact</div>`;
  body.innerHTML=html;
  initDragSort(cat);
}

function initDragSort(cat){
  const list=document.getElementById('opts-list');
  if(!list)return;
  let dragEl=null,dragOver=null;
  list.querySelectorAll('.opt-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      dragEl=row;
      row.style.opacity='0.4';
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',e=>{
      row.style.opacity='1';
      list.querySelectorAll('.opt-row').forEach(r=>r.classList.remove('drag-over'));
      if(dragEl&&dragOver&&dragEl!==dragOver){
        saveDragOrder(cat);
      }
      dragEl=null;dragOver=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(dragEl&&row!==dragEl){
        dragOver=row;
        list.querySelectorAll('.opt-row').forEach(r=>r.classList.remove('drag-over'));
        row.classList.add('drag-over');
        const rows=[...list.querySelectorAll('.opt-row')];
        const dragIdx=rows.indexOf(dragEl);
        const overIdx=rows.indexOf(row);
        if(dragIdx<overIdx) row.after(dragEl);
        else row.before(dragEl);
      }
    });
  });
}

async function saveDragOrder(cat){
  const list=document.getElementById('opts-list');
  if(!list)return;
  const rows=[...list.querySelectorAll('.opt-row')];
  const updates=rows.map((r,i)=>({id:parseInt(r.dataset.id),sort_order:i+1}));
  // Update all in parallel
  await Promise.all(updates.map(u=>patchOption(u.id,{sort_order:u.sort_order})));
  await reloadOpts();
  populateAllDropdowns();
  toast('ORDER SAVED');
}

function editOpt(id,current){
  const row=document.getElementById('opt-row-'+id);
  const valEl=document.getElementById('opt-val-'+id);
  const inp=document.createElement('input');
  inp.className='opt-inp';inp.value=current;
  valEl.replaceWith(inp);inp.focus();inp.select();
  // swap edit button to save
  const editBtn=row.querySelector('.opt-edit');
  editBtn.textContent='✓ SAVE';
  editBtn.onclick=()=>saveOpt(id,inp);
  inp.onkeydown=e=>{if(e.key==='Enter')saveOpt(id,inp);if(e.key==='Escape')renderSettingsCat(activeCat);};
}

async function saveOpt(id,inp){
  const newVal=inp.value.trim();if(!newVal)return;
  await patchOption(id,{value:newVal});
  toast('SAVED');
  await reloadOpts();
  renderSettingsCat(activeCat);
  populateAllDropdowns();
}

async function deleteOpt(id,val){
  if(!confirm(`Remove "${val}" from options?\n\nExisting entries using this value will keep it -- it just won't appear in new dropdowns.`))return;
  await delOption(id);
  toast('REMOVED -- '+val);
  await reloadOpts();
  renderSettingsCat(activeCat);
  populateAllDropdowns();
}

async function addOpt(cat){
  const inp=document.getElementById('opt-new-val');
  const val=inp.value.trim();if(!val){toast('Enter a value');return;}
  const existing=await getOptions(cat);
  const sortOrder=existing&&existing[0]?(existing[0].sort_order+1):1;
  const res=await postOption({category:cat,value:val,sort_order:sortOrder,is_default:false});
  if(res&&res[0]){
    toast('ADDED -- '+val);inp.value='';
    await reloadOpts();renderSettingsCat(activeCat);populateAllDropdowns();
  }
}

async function reloadOpts(){
  const data=await getOptions();
  CATS.forEach(c=>{opts[c]=(data||[]).filter(o=>o.category===c).map(o=>o.value);});
}

function exportCSV(){
  const h=['#','Title','Type','Season','Date','Year','Platform','Venue','Language','Format','Rating','Watch Count','First Watched','Last Watched','Favourite','Notes'];
  const rows=filtered.map((e,i)=>[
    i+1,`"${(e.title||'').replace(/"/g,'""')}"`,e.type||'',e.season||'',
    e.watch_date||'',e.year||'',`"${(e.platform||'').replace(/"/g,'""')}"`,
    `"${(e.venue||'').replace(/"/g,'""')}"`,e.language||'',e.format||'',
    e.rating||'',e.watch_count||1,e.first_watched||'',e.last_watched||'',
    e.is_favourite?'Yes':'No',`"${(e.notes||'').replace(/"/g,'""')}"`
  ]);
  const csv=[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`anil_watch_log_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();toast('CSV DOWNLOADED');
}

function exportPDF(){
  const win=window.open('','_blank');
  const byYear={};
  filtered.forEach(e=>{const y=e.year||'?';if(!byYear[y])byYear[y]=[];byYear[y].push(e);});
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  let body='';
  years.forEach(yr=>{
    const entries=byYear[yr];
    const sorted=[...entries].sort((a,b)=>(a.watch_date||'')>(b.watch_date||'')?1:-1);
    const numMap={};sorted.forEach((e,i)=>numMap[e.id]=i+1);
    body+=`<h2>${yr} <span class="yc">${entries.length} watched</span></h2><table><thead><tr><th>#</th><th>Title</th><th>Type</th><th>Date</th><th>Where</th><th>Lang</th><th>Format</th><th>★</th><th>×</th><th>Fav</th><th>Notes</th></tr></thead><tbody>`;
    entries.forEach(e=>{body+=`<tr><td>${String(numMap[e.id]).padStart(2,'0')}</td><td><strong>${e.title}</strong>${e.season?' S'+e.season:''}</td><td>${e.type||''}</td><td>${e.watch_date||''}</td><td>${e.venue||e.platform||''}</td><td>${e.language||''}</td><td>${e.format||''}</td><td>${e.rating?'★'.repeat(e.rating):''}</td><td>${e.watch_count>1?'×'+e.watch_count:''}</td><td>${e.is_favourite?'★':''}</td><td>${e.notes||''}</td></tr>`;});
    body+='</tbody></table>';
  });
  win.document.write(`<!DOCTYPE html><html><head><title>Anil Watch Log</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;1,700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Courier Prime',monospace;padding:24px 32px;color:#3a1a1a;background:#fff;font-size:11px}
  h1{font-family:'EB Garamond',serif;font-size:34px;font-style:italic;border-bottom:2px solid #3a1a1a;padding-bottom:8px;margin-bottom:4px}
  h2{font-family:'EB Garamond',serif;font-size:24px;font-style:italic;margin:24px 0 8px;border-bottom:1px solid #ddc8bc;padding-bottom:4px}
  .yc{font-size:12px;font-weight:normal;color:#a07060;font-family:'Courier Prime',monospace;font-style:normal}
  .sub{font-size:10px;color:#a07060;margin-bottom:24px}
  table{width:100%;border-collapse:collapse;margin-bottom:8px}
  th{background:#3a1a1a;color:#faf2f0;padding:5px 8px;text-align:left;font-size:9px;letter-spacing:1px}
  td{padding:4px 8px;border-bottom:1px dashed #ddc8bc;font-size:10px;vertical-align:top}
  tr:nth-child(even){background:#faf2f0}
  @media print{body{padding:12px}}</style></head>
  <body><h1>Anil // Watch Log</h1>
  <div class="sub">Exported ${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})} &nbsp;.&nbsp; ${filtered.length} titles</div>
  ${body}</body></html>`);
  win.document.close();setTimeout(()=>win.print(),700);
  toast('PDF -- PRINT DIALOG OPENING');
}

function renderStatsPage(){
  const panel=document.getElementById('stats-panel');
  if(!all.length){panel.innerHTML='<div class="empty">No data yet</div>';return;}

  // Per year stats
  const years=[...new Set(all.map(e=>e.year).filter(Boolean))].sort((a,b)=>b-a);
  const byYear={};
  all.forEach(e=>{if(e.year){if(!byYear[e.year])byYear[e.year]={total:0,theatre:0,ott:0,movies:0,series:0,docu:0,favs:0,platforms:{}};
    const y=byYear[e.year];
    y.total++;
    if(e.format==='Theatre')y.theatre++;else y.ott++;
    if((e.type||'movie')==='movie')y.movies++;
    else if(e.type==='series')y.series++;
    else if(e.type==='docu')y.docu++;
    if(e.is_favourite)y.favs++;
    const p=e.venue||e.platform||'Other';
    y.platforms[p]=(y.platforms[p]||0)+1;
  }});

  // Platform totals
  const platTotals={};
  all.forEach(e=>{const p=e.venue||e.platform||'Other';platTotals[p]=(platTotals[p]||0)+1;});
  const topPlats=Object.entries(platTotals).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxPlat=topPlats[0]?topPlats[0][1]:1;

  // Language totals
  const langTotals={};
  all.forEach(e=>{const l=e.language||'Hindi/English';langTotals[l]=(langTotals[l]||0)+1;});
  const topLangs=Object.entries(langTotals).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Best rated
  const rated=all.filter(e=>e.rating>=4).sort((a,b)=>b.rating-a.rating||b.year-a.year).slice(0,10);

  let h=`<div style="padding:20px 24px">`;
  h+=`<div style="font-family:var(--serif);font-size:30px;font-style:italic;color:var(--ink);border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:20px">Statistics</div>`;

  // Summary cards
  h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">`;
  const cards=[
    ['TOTAL WATCHED',all.length],
    ['IN THEATRE',all.filter(e=>e.format==='Theatre').length],
    ['FAVOURITES',all.filter(e=>e.is_favourite).length],
    ['YEARS TRACKED',years.length]
  ];
  cards.forEach(([l,v])=>{
    h+=`<div style="background:var(--rose);border:1px solid var(--rb);padding:14px 16px;border-radius:3px">
      <div style="font-size:9px;letter-spacing:1.5px;color:var(--ink3);margin-bottom:6px">${l}</div>
      <div style="font-family:var(--serif);font-size:28px;color:var(--ink)">${v}</div>
    </div>`;
  });
  h+=`</div>`;

  // Per year table
  h+=`<div style="margin-bottom:28px">
    <div style="font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:10px;font-style:italic">By Year</div>
    <table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px">
      <thead><tr style="background:var(--ink);color:var(--bg)">
        <th style="padding:8px 12px;text-align:left;letter-spacing:1px">YEAR</th>
        <th style="padding:8px 12px;text-align:center">TOTAL</th>
        <th style="padding:8px 12px;text-align:center">MOVIES</th>
        <th style="padding:8px 12px;text-align:center">SERIES</th>
        <th style="padding:8px 12px;text-align:center">DOCU</th>
        <th style="padding:8px 12px;text-align:center">THEATRE</th>
        <th style="padding:8px 12px;text-align:center">OTT</th>
        <th style="padding:8px 12px;text-align:center">FAVS</th>
      </tr></thead><tbody>`;
  years.forEach((yr,i)=>{
    const y=byYear[yr];
    h+=`<tr style="background:${i%2?'var(--rose)':'var(--surface)'};border-bottom:1px dashed var(--rb)">
      <td style="padding:8px 12px;font-family:var(--serif);font-size:16px;font-style:italic">${yr}</td>
      <td style="padding:8px 12px;text-align:center;font-weight:700">${y.total}</td>
      <td style="padding:8px 12px;text-align:center">${y.movies}</td>
      <td style="padding:8px 12px;text-align:center">${y.series}</td>
      <td style="padding:8px 12px;text-align:center">${y.docu}</td>
      <td style="padding:8px 12px;text-align:center;color:var(--amber)">${y.theatre}</td>
      <td style="padding:8px 12px;text-align:center">${y.ott}</td>
      <td style="padding:8px 12px;text-align:center;color:var(--red)">${y.favs>0?'★'.repeat(Math.min(y.favs,5))+(y.favs>5?' +'+( y.favs-5):''):'-'}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  // Top platforms bar chart
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px">`;
  h+=`<div>
    <div style="font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:12px;font-style:italic">Top Platforms</div>`;
  topPlats.forEach(([p,c])=>{
    const pct=Math.round(c/maxPlat*100);
    h+=`<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--ink);margin-bottom:3px">
        <span>${p}</span><span>${c}</span>
      </div>
      <div style="background:var(--rose);border-radius:2px;height:8px">
        <div style="background:var(--ink);height:8px;border-radius:2px;width:${pct}%"></div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Languages
  h+=`<div>
    <div style="font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:12px;font-style:italic">Languages</div>`;
  const maxLang=topLangs[0]?topLangs[0][1]:1;
  topLangs.forEach(([l,c])=>{
    const pct=Math.round(c/maxLang*100);
    h+=`<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--ink);margin-bottom:3px">
        <span>${l}</span><span>${c}</span>
      </div>
      <div style="background:var(--rose);border-radius:2px;height:8px">
        <div style="background:var(--red);height:8px;border-radius:2px;width:${pct}%"></div>
      </div>
    </div>`;
  });
  h+=`</div></div>`;

  // Best rated
  if(rated.length){
    h+=`<div>
      <div style="font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:10px;font-style:italic">Highest Rated</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">`;
    rated.forEach(e=>{
      h+=`<div style="background:var(--rose);border:1px solid var(--rb);padding:10px 14px;border-radius:3px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-family:var(--serif);font-size:15px;color:var(--ink)">${e.title}${e.season?' S'+e.season:''}</div>
          <div style="font-size:10px;color:var(--ink3);font-family:var(--mono)">${e.year} - ${e.platform||e.venue||''}</div>
        </div>
        <div style="font-size:16px;color:var(--red)">${'★'.repeat(e.rating)}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  h+=`</div>`;
  panel.innerHTML=h;
}
